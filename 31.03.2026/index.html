<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body>
    <div class="card">
        <input type="text" id="user_input" placeholder="Enter Name">
        <button id="save_btn">Save</button>
    </div>
    <div class="card">
        <p id="reveal_p">The text will appear here</p>
        <button id="reveal_btn">Reveal Saved Name</button>
    </div>
    <div class="card">
        <button id="clear_btn">Press to clear</button>
    </div>
    <div class="card">
        <button id="clear_all_btn">Press to clear all localStorage</button>
    </div>
    <div class="card">
        <button onclick="themeToggler()">Theme Toggle</button>
    </div>
    <div class="card">
        <p>Counts: </p><span id="count_span"></span>
        <button id="count_btn">Count</button>
    </div>
    <div class="card">
        <p>Visits: </p><span id="visits_span"></span>
    </div>
    <div class="card_list">
    <div class="card">
        <input type="text" id="task_input" placeholder="Enter task">
        <button id="task_save_btn">Add</button>
        <button id="task_load_btn">Load tasks</button>
    </div>
    <ul id="task_list"></ul>
    </div>
    <div class="card">
        <input type="text" id="color_input" placeholder="Enter color (red, blue, green)">
        <button id="color_add_btn">Create color box</button>
    </div>
    <div class="card" id="color_container"></div>
</body>
<script src="js/script.js"></script>

</html>
